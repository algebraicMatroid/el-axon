name: Build ghcr.io image

on:
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/axon

jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            dockerfile: Dockerfile
            suffix: amd64
          - platform: linux/arm64
            dockerfile: Dockerfile.arm64
            suffix: arm64
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Determine tag
      id: tag
      env:
        REF_NAME: ${{ github.ref_name }}
      run: |
        if [ "${REF_NAME}" = "main" ]; then
          echo "name=latest" >> "$GITHUB_OUTPUT"
        else
          echo "name=${REF_NAME}" >> "$GITHUB_OUTPUT"
        fi

    - name: Build and push
      env:
        TAG: ${{ steps.tag.outputs.name }}
        SHA_SHORT: ${{ github.sha }}
      run: |
        SHORT="${SHA_SHORT:0:7}"
        docker buildx build \
          --platform "${{ matrix.platform }}" \
          --file "./${{ matrix.dockerfile }}" \
          --tag "${IMAGE}:${TAG}-${{ matrix.suffix }}" \
          --tag "${IMAGE}:sha-${SHORT}-${{ matrix.suffix }}" \
          --push .

  manifest:
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write

    steps:
    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Determine tag
      id: tag
      env:
        REF_NAME: ${{ github.ref_name }}
      run: |
        if [ "${REF_NAME}" = "main" ]; then
          echo "name=latest" >> "$GITHUB_OUTPUT"
        else
          echo "name=${REF_NAME}" >> "$GITHUB_OUTPUT"
        fi

    - name: Create multi-arch manifest
      env:
        TAG: ${{ steps.tag.outputs.name }}
        SHA_SHORT: ${{ github.sha }}
      run: |
        SHORT="${SHA_SHORT:0:7}"

        docker buildx imagetools create \
          --tag "${IMAGE}:${TAG}" \
          "${IMAGE}:${TAG}-amd64" \
          "${IMAGE}:${TAG}-arm64"

        docker buildx imagetools create \
          --tag "${IMAGE}:sha-${SHORT}" \
          "${IMAGE}:sha-${SHORT}-amd64" \
          "${IMAGE}:sha-${SHORT}-arm64"
